<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Casonreir - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .bg-animate {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1e3a8a 0%, #0f172a 100%);
            z-index: -1;
        }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-animate"></div>
    <div class="orb w-96 h-96 bg-blue-600/30 -top-20 -left-20"></div>
    <div class="orb w-96 h-96 bg-purple-600/20 bottom-20 right-20"></div>

    <div class="glass p-12 rounded-[3rem] shadow-2xl w-full max-w-md text-center" data-aos="zoom-in">
        <div class="w-20 h-20 bg-blue-500 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-blue-500/50 transform rotate-12">
            <i class="fas fa-shield-alt text-white text-3xl"></i>
        </div>
        <h1 class="text-4xl font-black text-white mb-2 tracking-tighter">BIENVENIDO</h1>
        <p class="text-blue-300 mb-10 font-medium">Panel de Control Fundación</p>

        <form th:action="@{/login}" method="post" class="space-y-6">
            <div th:if="${param.error}" class="bg-red-500/20 text-red-400 p-4 rounded-2xl text-sm border border-red-500/50 mb-6">
                Usuario o contraseña incorrectos
            </div>

            <div class="relative">
                <i class="fas fa-user absolute left-6 top-1/2 -translate-y-1/2 text-blue-400"></i>
                <input type="text" name="username" placeholder="Nombre de Usuario"
                       class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-white outline-none focus:ring-4 focus:ring-blue-500/20 transition-all font-bold">
            </div>

            <div class="relative">
                <i class="fas fa-lock absolute left-6 top-1/2 -translate-y-1/2 text-blue-400"></i>
                <input type="password" name="password" placeholder="••••••••"
                       class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-white outline-none focus:ring-4 focus:ring-blue-500/20 transition-all font-bold">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-2xl shadow-blue-600/50 transition-all transform hover:scale-[1.02] active:scale-95">
                INICIAR SESIÓN <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <p class="mt-10 text-slate-500 text-xs uppercase tracking-widest font-black">Casonreir v2.0 &copy; 2026</p>
    </div>
</body>
</html>
