<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Becados')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1600px] mx-auto px-6 pt-32 pb-20">

        <!-- CABECERA DEL MÓDULO -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Gestión de <span class="text-blue-600">Becados</span></h1>
                <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Control total de beneficiarios y expedientes</p>
            </div>

            <a href="/becados/nuevo" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-blue-200 hover:scale-105 active:scale-95 transition-all flex items-center">
                <i class="fas fa-plus-circle mr-3 text-xl"></i> NUEVO BECADO
            </a>
        </div>

        <!-- BARRA DE BÚSQUEDA Y FILTROS -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-10 flex flex-col md:flex-row gap-6 items-center">
            <form th:action="@{/becados}" method="get" class="flex-1 w-full flex gap-4">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar por nombre, apellido o CI..."
                           class="w-full pl-14 pr-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold transition-all">
                </div>
                <select name="estado" class="bg-slate-50 border-0 rounded-2xl px-6 font-bold text-slate-600 focus:ring-4 focus:ring-blue-100 outline-none">
                    <option value="">Todos los Estados</option>
                    <option value="ACTIVO" th:selected="${estado == 'ACTIVO'}">Activos</option>
                    <option value="INACTIVO" th:selected="${estado == 'INACTIVO'}">Inactivos</option>
                </select>
                <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-sm tracking-widest hover:bg-blue-600 transition-all uppercase">Filtrar</button>
            </form>
        </div>

        <!-- TABLA DE RESULTADOS -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50/50 border-b border-slate-100">
                    <tr>
                        <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Becado</th>
                        <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Datos Personales</th>
                        <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Ingreso / Estado</th>
                        <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Seguimiento</th>
                        <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="b : ${becados}" class="hover:bg-blue-50/20 transition-all group">
                        <td class="px-8 py-6">
                            <div class="flex items-center space-x-4">
                                <!-- FOTO DEL BECADO -->
                                <img th:src="${b.informacionPersonal?.foto != null ? '/uploads/fotos_becados/' + b.informacionPersonal.foto : 'https://via.placeholder.com/60/E0F2FE/2563EB?text=NO+FOTO'}"
                                     alt="Foto" class="w-14 h-14 rounded-full object-cover shadow-md border-2 border-blue-100">
                                <div>
                                    <p class="font-black text-slate-800 text-lg leading-none mb-1" th:text="${b.informacionPersonal?.nombre + ' ' + b.informacionPersonal?.apellidoPat}"></p>
                                    <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase" th:text="${'ID: #' + b.id}"></p>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <p class="text-slate-600 font-bold text-sm" th:text="${b.informacionPersonal?.ci}"></p>
                            <p class="text-slate-400 text-xs" th:text="${b.informacionPersonal?.fechaNac}"></p>
                        </td>
                        <td class="px-8 py-6">
                            <p class="text-slate-600 font-bold text-sm" th:text="${b.ingresoBecado}"></p>
                            <span th:text="${b.estadoBecado}"
                                  th:class="${b.estadoBecado == 'ACTIVO' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'} + ' px-3 py-1 rounded-xl text-[10px] font-black tracking-widest border border-current opacity-80 mt-1 inline-block'">
                            </span>
                        </td>
                        <td class="px-8 py-6">
                            <div class="flex space-x-3">
                                <!-- ACCESO A HISTORIAL MÉDICO (FILTRADO) -->
                                <a th:href="@{/config/historial-medico(buscar=${b.informacionPersonal?.nombre})}"
                                   title="Ver Historial Médico"
                                   class="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm">
                                    <i class="fas fa-heartbeat"></i>
                                </a>
                                <!-- ACCESO A HISTORIAL ACADÉMICO (FILTRADO) -->
                                <a th:href="@{/config/historial-academico(buscar=${b.informacionPersonal?.nombre})}"
                                   title="Ver Historial Académico"
                                   class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                                    <i class="fas fa-graduation-cap"></i>
                                </a>
                                <!-- En la columna de Seguimiento, añade este enlace -->
                                <a th:href="@{'/becados/expediente/' + ${b.id}}"
                                   class="w-9 h-9 bg-slate-900 text-white rounded-lg flex items-center justify-center hover:bg-slate-700 transition-all shadow-sm"
                                   title="Descargar Expediente Completo">
                                    <i class="fas fa-file-invoice"></i>
                                </a>
                            </div>
                        </td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <a th:href="@{'/becados/editar/' + ${b.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-pen text-xs"></i>
                            </a>
                            <a th:href="@{'/becados/eliminar/' + ${b.id}}"
                               onclick="return confirm('¿Estás seguro de eliminar este registro?')"
                               class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- PAGINACIÓN -->
            <div class="bg-slate-50/50 px-8 py-6 flex justify-between items-center border-t border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    Página <span class="text-slate-800 font-black" th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
                </p>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 0}" th:href="@{/becados(page=${currentPage - 1}, buscar=${buscar}, estado=${estado})}"
                       class="px-5 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-slate-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm">ANTERIOR</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/becados(page=${currentPage + 1}, buscar=${buscar}, estado=${estado})}"
                       class="px-5 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-slate-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm">SIGUIENTE</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
