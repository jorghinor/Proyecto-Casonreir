<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Padrinos')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">
    <div th:replace="~{fragments :: menu}"></div>
    <main class="max-w-[1600px] mx-auto px-6 pt-32 pb-20">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-800 uppercase italic">Control de <span class="text-purple-600">Padrinos</span></h1>
                <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Soporte y red de impacto social</p>
            </div>
            <a th:href="@{/padrinos/nuevo}" class="bg-purple-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all flex items-center">
                <i class="fas fa-heart mr-3"></i> NUEVO PADRINO
            </a>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-8 flex flex-col md:flex-row gap-4 items-center">
            <form th:action="@{/padrinos}" method="get" class="flex-1 w-full flex gap-4">
                <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar..." class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-purple-100 outline-none font-bold">
                <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-xs uppercase hover:bg-purple-600 transition-all">Filtrar</button>
            </form>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="px-8 py-6">Padrino</th>
                        <th class="px-8 py-6">CI / Documento</th>
                        <th class="px-8 py-6">Estado</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="p : ${padrinos}" class="hover:bg-purple-50/20 transition-all group">
                        <td class="px-8 py-6 flex items-center space-x-4">
                            <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center text-purple-600 font-black" th:text="${p.informacionPersonal != null ? #strings.substring(p.informacionPersonal.nombre,0,1) : 'P'}"></div>
                            <p class="font-black text-slate-800" th:text="${p.informacionPersonal != null ? p.informacionPersonal.nombre + ' ' + p.informacionPersonal.apellidoPat : 'Sin Nombre'}"></p>
                        </td>
                        <td class="px-8 py-6 font-bold text-slate-400" th:text="${p.informacionPersonal != null ? p.informacionPersonal.ci : '-'}"></td>
                        <td class="px-8 py-6"><span th:text="${p.estado}" class="bg-emerald-50 text-emerald-600 px-4 py-1 rounded-xl text-[10px] font-black"></span></td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <a th:href="@{'/padrinos/editar/' + ${p.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-purple-600 hover:text-white transition-all"><i class="fas fa-pen text-xs"></i></a>
                            <a th:href="@{'/padrinos/eliminar/' + ${p.id}}" onclick="return confirm('¿Eliminar?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all"><i class="fas fa-trash-alt text-xs"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="bg-slate-50 px-8 py-6 flex justify-between items-center border-t">
                <p class="text-[10px] font-black text-slate-400 uppercase">Página <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span></p>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 0}" th:href="@{/padrinos(page=${currentPage - 1})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black hover:bg-purple-600 hover:text-white transition-all">ANTERIOR</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/padrinos(page=${currentPage + 1})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black hover:bg-purple-600 hover:text-white transition-all">SIGUIENTE</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
