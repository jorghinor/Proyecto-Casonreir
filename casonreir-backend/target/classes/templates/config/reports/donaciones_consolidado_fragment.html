<div th:fragment="report">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-black text-slate-800 uppercase italic">Consolidado por Categoría</h2>
        <div class="flex space-x-4">
            <!-- Formulario de filtro de fechas dentro del AJAX -->
            <form id="filter-form" class="flex items-center space-x-2 bg-slate-100 p-2 rounded-xl">
                <input type="date" id="date-inicio" th:value="${inicio}" class="bg-transparent border-0 text-xs font-bold">
                <span class="text-slate-400">/</span>
                <input type="date" id="date-fin" th:value="${fin}" class="bg-transparent border-0 text-xs font-bold">
                <button type="button" onclick="refreshConsolidado()" class="bg-slate-900 text-white p-2 rounded-lg"><i class="fas fa-sync-alt text-[10px]"></i></button>
            </form>
            <a href="#" th:onclick="'downloadConsolidadoPdf()'" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase shadow-lg flex items-center">
                <i class="fas fa-file-pdf mr-2"></i> PDF
            </a>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white rounded-3xl border p-6">
            <table class="w-full text-left">
                <thead>
                <tr class="text-[10px] font-black text-slate-400 uppercase border-b">
                    <th class="py-4">Categoría</th>
                    <th class="py-4 text-right">Total Bs.</th>
                </tr>
                </thead>
                <tbody class="divide-y">
                <tr th:each="entry : ${totalesPorTipo}">
                    <td class="py-4 font-bold text-slate-700" th:text="${entry.key}"></td>
                    <td class="py-4 text-right font-black text-blue-600" th:text="${'Bs. ' + #numbers.formatDecimal(entry.value, 1, 2)}"></td>
                </tr>
                <tr class="bg-slate-50 font-black">
                    <td class="py-4">TOTAL GENERAL</td>
                    <td class="py-4 text-right text-emerald-600" th:text="${'Bs. ' + #numbers.formatDecimal(totalGeneral, 1, 2)}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script th:inline="javascript">
        function refreshConsolidado() {
            const ini = document.getElementById('date-inicio').value;
            const fin = document.getElementById('date-fin').value;
            const url = /*[[@{/config/reportes/donaciones-consolidado-html}]]*/ + `?inicio=${ini}&fin=${fin}`;

            fetch(url)
                .then(res => res.text())
                .then(html => {
                    document.getElementById('report-content').innerHTML = html;
                });
        }

        function downloadConsolidadoPdf() {
            const ini = document.getElementById('date-inicio').value;
            const fin = document.getElementById('date-fin').value;
            window.location.href = /*[[@{/config/reportes/donaciones-consolidado-pdf}]]*/ + `?inicio=${ini}&fin=${fin}`;
        }
    </script>
</div>
