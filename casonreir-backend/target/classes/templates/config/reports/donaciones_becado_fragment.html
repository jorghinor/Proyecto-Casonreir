<div th:fragment="report">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-black text-slate-800 uppercase italic">Donaciones por Becado</h2>
        <!-- Botón para descargar el PDF de este reporte específico -->
        <a th:href="@{/config/reportes/donaciones-becado-pdf}"
           class="bg-rose-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase shadow-lg flex items-center">
            <i class="fas fa-file-pdf mr-2"></i> Descargar PDF
        </a>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                <th class="py-4 px-2">Becado</th>
                <th class="py-4 px-2">Donación</th>
                <th class="py-4 px-2">Monto</th>
                <th class="py-4 px-2">Fecha</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="db : ${donacionesBecados}" class="text-sm">
                <td class="py-4 px-2 font-bold text-slate-700"
                    th:text="${db.becado.informacionPersonal.nombre + ' ' + db.becado.informacionPersonal.apellidoPat}"></td>
                <td class="py-4 px-2 text-slate-500" th:text="${db.donacion.nombre}"></td>
                <td class="py-4 px-2 font-black text-emerald-600" th:text="${'Bs. ' + db.cantidad}"></td>
                <td class="py-4 px-2 text-slate-500" th:text="${db.fecha}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
