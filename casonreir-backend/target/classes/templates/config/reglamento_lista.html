<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Reglamentos')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1500px] mx-auto px-6 pt-32 pb-20">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic text-slate-700">Reglamentos Internos</h1>
                <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Normativa y manuales operativos</p>
            </div>
            <a th:href="@{/config/reglamentos/nuevo}" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all text-xs uppercase flex items-center">
                <i class="fas fa-plus-circle mr-3 text-xl"></i> NUEVA NORMATIVA
            </a>
        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="px-8 py-6 w-32">Ref.</th>
                        <th class="px-8 py-6">Vista Previa Limpia</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="r : ${reglamentos}" class="hover:bg-indigo-50/10 transition-all group">
                        <td class="px-8 py-6">
                            <span class="bg-slate-900 text-white px-3 py-1.5 rounded-lg font-black text-[10px]" th:text="${'REG-' + r.id}"></span>
                        </td>
                        <td class="px-8 py-6">
                            <p class="text-slate-500 text-sm font-medium line-clamp-1 italic" th:text="${r.descripcionCorta}"></p>
                        </td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <!-- PASAMOS EL CONTENIDO DIRECTAMENTE COMO ATRIBUTO DATA -->
                            <button type="button"
                                    th:data-content="${r.contenido}"
                                    onclick="openModal(this)"
                                    class="inline-flex w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl items-center justify-center hover:bg-indigo-600 hover:text-white transition-all">
                                <i class="fas fa-eye text-xs"></i>
                            </button>
                            <a th:href="@{'/config/reglamentos/editar/' + ${r.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fas fa-pen text-xs"></i></a>
                            <a th:href="@{'/config/reglamentos/eliminar/' + ${r.id}}" onclick="return confirm('¿Eliminar?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm"><i class="fas fa-trash-alt text-xs"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- MODAL DE LECTURA -->
    <div id="reglamentoModal" class="hidden fixed inset-0 z-[200] overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-[3rem] text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full">
                <div class="bg-white px-10 pt-10 pb-4">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-3xl font-black text-slate-800 tracking-tighter uppercase italic" id="modal-title">Lectura de Reglamento</h3>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i class="fas fa-times text-2xl"></i></button>
                    </div>
                    <div class="h-px bg-slate-100 mb-8"></div>
                    <div id="modal-content" class="prose prose-slate max-w-none min-h-[400px] text-slate-600 overflow-y-auto px-2">
                        <!-- El contenido HTML se inyectará aquí -->
                    </div>
                </div>
                <div class="bg-slate-50 px-10 py-6 text-right">
                    <button type="button" onclick="closeModal()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-600 transition-all">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT CORREGIDO SIN ERRORES -->
    <script>
        function openModal(btn) {
            const content = btn.getAttribute('data-content');
            if (content) {
                document.getElementById('modal-content').innerHTML = content;
                document.getElementById('reglamentoModal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal() {
            document.getElementById('reglamentoModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
