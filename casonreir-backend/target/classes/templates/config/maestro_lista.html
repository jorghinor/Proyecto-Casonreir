<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Tipos')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">
    <div th:replace="~{fragments :: menu}"></div>
    <main class="max-w-[1200px] mx-auto px-6 pt-32 pb-20">
        <div class="flex justify-between items-center mb-10" data-aos="fade-down">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Tipos de <span class="text-blue-600" th:text="${modulo}"></span></h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Catálogo de parámetros del sistema</p>
            </div>
            <button onclick="document.getElementById('modal-nuevo').classList.remove('hidden')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all uppercase text-xs tracking-widest">NUEVO TIPO</button>
        </div>

        <!-- BUSCADOR -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-8">
            <form th:action="${url}" method="get" class="flex gap-4">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar por nombre..."
                           class="w-full pl-14 pr-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold">
                </div>
                <button type="submit" class="bg-slate-900 text-white px-8 rounded-2xl font-black text-xs uppercase tracking-widest">Filtrar</button>
            </form>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black uppercase text-slate-400">
                        <th class="px-8 py-6">ID</th>
                        <th class="px-8 py-6">Nombre del Parámetro</th>
                        <th class="px-8 py-6">Estado</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="item : ${items}" class="hover:bg-blue-50/20 transition-all group">
                        <td class="px-8 py-6 font-bold text-slate-300 text-xs" th:text="${'#' + item.id}"></td>
                        <td class="px-8 py-6 font-black text-slate-700 uppercase tracking-tighter" th:text="${item.nombre}"></td>
                        <td class="px-8 py-6">
                            <span th:text="${item.estado}" class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase border border-emerald-100"></span>
                        </td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <button class="w-10 h-10 bg-slate-100 text-slate-400 rounded-xl hover:bg-rose-600 hover:text-white transition-all">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <!-- PAGINACIÓN -->
            <div class="bg-slate-50/50 px-8 py-6 flex justify-between items-center">
                <p class="text-[10px] font-black text-slate-400 uppercase">Página <span th:text="${currentPage + 1}"></span> de <span th:text="${totalPages}"></span></p>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 0}" th:href="@{${url}(page=${currentPage - 1}, buscar=${buscar})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black">ANTERIOR</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{${url}(page=${currentPage + 1}, buscar=${buscar})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black">SIGUIENTE</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
