<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${titulo})}"></head>
<body class="bg-slate-50 font-sans">
<div th:replace="~{fragments :: menu}"></div>
<main class="max-w-[1000px] mx-auto px-6 pt-32 pb-20">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-black text-slate-800" th:text="${titulo}"></h1>
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Administración de catálogo</p>
        </div>
        <!-- Botón Nuevo dinámico -->
        <a th:href="@{'/config/' + ${url} + '/nuevo'}" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-xs uppercase hover:bg-blue-600 transition-all">
            + Nuevo Registro
        </a>
    </div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b">
            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <th class="px-8 py-4">ID</th>
                <th class="px-8 py-4">Nombre / Descripción</th>
                <th class="px-8 py-4 text-right">Acciones</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
            <tr th:each="item : ${items}" class="hover:bg-slate-50/50 transition-all">
                <td class="px-8 py-4 text-slate-400 font-mono text-sm" th:text="${item.id}"></td>
                <td class="px-8 py-4">
                    <!-- Soporte para 'name' (Grupos/Permisos) o 'nombre' (Tipos) -->
                    <span class="font-bold text-slate-700" th:text="${item.nombre ?: item.name}"></span>
                </td>
                <td class="px-8 py-4 text-right">
                    <a th:href="@{'/config/' + ${url} + '/editar/' + ${item.id}}"
                       class="inline-flex items-center justify-center w-8 h-8 bg-slate-100 text-slate-500 rounded-lg hover:bg-blue-600 hover:text-white transition-all">
                        <i class="fas fa-pen text-[10px]"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
