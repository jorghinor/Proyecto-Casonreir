<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Asignaciones')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1500px] mx-auto px-6 pt-32 pb-20">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic text-blue-600">Vínculos Padrino - Becado</h1>
                <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Gestión de apoyo directo y apadrinamiento</p>
            </div>
            <a th:href="@{/config/padrino-becado/nuevo}" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all text-xs uppercase flex items-center">
                <i class="fas fa-link mr-3 text-xl"></i> NUEVA ASIGNACIÓN
            </a>
        </div>

        <!-- BUSCADOR -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-8 flex gap-4">
            <form th:action="@{/config/padrino-becado}" method="get" class="flex-1 flex gap-4">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar por padrino o ahijado..."
                           class="w-full pl-14 pr-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none font-bold">
                </div>
                <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-xs uppercase hover:bg-blue-600 transition-all">Filtrar</button>
            </form>
        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="px-8 py-6">Becado / Ahijado</th>
                        <th class="px-8 py-6">Padrino Responsable</th>
                        <th class="px-8 py-6">Fecha Inicio</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="a : ${asignaciones}" class="hover:bg-blue-50/10 transition-all group">
                        <td class="px-8 py-6">
                            <p class="font-black text-slate-800 text-lg" th:text="${a.becado.informacionPersonal.nombre + ' ' + a.becado.informacionPersonal.apellidoPat}"></p>
                            <span th:text="${a.estado}" class="text-[9px] font-black uppercase text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md"></span>
                        </td>
                        <td class="px-8 py-6">
                            <p class="font-bold text-slate-700" th:text="${a.padrino.informacionPersonal.nombre + ' ' + a.padrino.informacionPersonal.apellidoPat}"></p>
                        </td>
                        <td class="px-8 py-6 font-bold text-slate-500 text-sm" th:text="${a.fechaInicio}">-</td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <a th:href="@{'/config/padrino-becado/editar/' + ${a.becado.id} + '/' + ${a.padrino.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fas fa-pen text-xs"></i></a>
                            <a th:href="@{'/config/padrino-becado/eliminar/' + ${a.becado.id} + '/' + ${a.padrino.id}}" onclick="return confirm('¿Desvincular apoyo?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm"><i class="fas fa-unlink text-xs"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(asignaciones)}">
                        <td colspan="4" class="px-8 py-10 text-center text-slate-400 font-bold uppercase tracking-widest">No se encontraron asignaciones registradas.</td>
                    </tr>
                </tbody>
            </table>

            <!-- PAGINACIÓN -->
            <div class="bg-slate-50 px-8 py-6 flex justify-between items-center border-t border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase">Página <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span></p>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 0}" th:href="@{/config/padrino-becado(page=${currentPage - 1}, buscar=${buscar})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black uppercase transition-all">Anterior</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/config/padrino-becado(page=${currentPage + 1}, buscar=${buscar})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black uppercase transition-all">Siguiente</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
