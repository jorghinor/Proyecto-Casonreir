<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Registro de Donación')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">
    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-5xl mx-auto px-4 py-16 -mt-10">
        <div class="pt-23 pb-12 bg-gradient-to-br from-emerald-600 to-teal-700 text-white text-center shadow-xl">
            <h1 class="text-5xl font-black mb-2 tracking-tighter uppercase italic">Registro de <span class="text-emerald-200">Donación</span></h1>
        </div>
        <form th:action="@{/donaciones/guardar}" th:object="${donacion}" method="post" class="bg-white rounded-[3rem] shadow-2xl p-12 border">
            <input type="hidden" th:field="*{id}" />
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Monto (Bs.)</label>
                        <input type="number" step="0.01" th:field="*{cantidad}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-emerald-100 outline-none text-3xl font-black text-emerald-600" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tipo de Donación</label>
                        <select th:field="*{tipoDonacion}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl outline-none font-bold">
                            <option th:each="t : ${tipos}" th:value="${t.id}" th:text="${t.nombre}"></option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha</label>
                        <input type="date" th:field="*{fecha}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl outline-none font-bold" required>
                    </div>
                </div>
                <div class="space-y-8 bg-slate-50 p-8 rounded-3xl">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Padrino Responsable</label>
                        <select th:field="*{padrino}" class="w-full px-6 py-4 bg-white border-0 rounded-2xl outline-none font-bold">
                            <option value="">Donante Externo / Sin Padrino</option>
                            <option th:each="p : ${padrinos}" th:value="${p.id}"
                                    th:text="${p.informacionPersonal != null ? p.informacionPersonal.nombre + ' ' + p.informacionPersonal.apellidoPat : 'Padrino #' + p.id}"></option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Descripción</label>
                        <textarea th:field="*{nombre}" class="w-full px-6 py-4 bg-white border-0 rounded-2xl outline-none font-medium" rows="3"></textarea>
                    </div>
                </div>
            </div>
            <div class="mt-12 pt-10 border-t flex justify-between">
                <a href="/donaciones" class="text-xs font-black text-slate-400 uppercase">Cancelar</a>
                <button type="submit" class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-12 py-5 rounded-3xl font-black shadow-2xl hover:scale-105 transition-all">GUARDAR REGISTRO</button>
            </div>
        </form>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
