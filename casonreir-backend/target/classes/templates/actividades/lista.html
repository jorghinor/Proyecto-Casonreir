<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Actividades')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1600px] mx-auto px-6 pt-32 pb-20">
        <!-- HEADER PRINCIPAL -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Control de Actividades</h1>
                <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Gestión de eventos y agenda</p>
            </div>

            <!-- BOTÓN NUEVA ACTIVIDAD (FORZADO) -->
            <a th:href="@{/actividades/nuevo}" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition-all flex items-center">
                <i class="fas fa-plus-circle mr-3 text-xl"></i> NUEVA ACTIVIDAD
            </a>
        </div>

        <!-- BUSCADOR -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-10 flex gap-4">
            <form th:action="@{/actividades}" method="get" class="flex-1 flex gap-4">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar actividad..."
                           class="w-full pl-14 pr-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold">
                </div>
                <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-xs uppercase hover:bg-indigo-600 transition-all">Filtrar</button>
            </form>
        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="px-8 py-6">Actividad</th>
                        <th class="px-8 py-6">Fecha Inicio</th>
                        <th class="px-8 py-6">Estado</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="a : ${actividades}" class="hover:bg-indigo-50/20 transition-all group">
                        <td class="px-8 py-6">
                            <p class="font-black text-slate-800 text-lg" th:text="${a.nombre}">-</p>
                        </td>
                        <td class="px-8 py-6 font-bold text-slate-500" th:text="${a.fechaInicio}">-</td>
                        <td class="px-8 py-6">
                            <span th:text="${a.estado}" class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase"></span>
                        </td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <a th:href="@{'/actividades/editar/' + ${a.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-indigo-600 hover:text-white transition-all"><i class="fas fa-pen text-xs"></i></a>
                            <a th:href="@{'/actividades/eliminar/' + ${a.id}}" onclick="return confirm('¿Eliminar?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all"><i class="fas fa-trash-alt text-xs"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- PAGINACIÓN -->
            <div class="bg-slate-50 px-8 py-6 flex justify-between items-center border-t">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    Página <span class="text-slate-800" th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
                </p>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 0}" th:href="@{/actividades(page=${currentPage - 1})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black hover:bg-indigo-600 transition-all">ANTERIOR</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/actividades(page=${currentPage + 1})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black hover:bg-indigo-600 transition-all">SIGUIENTE</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
