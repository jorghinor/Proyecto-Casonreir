<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Familias')}"></head>
<body class="bg-slate-50">
    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1600px] mx-auto px-6 pt-32">
        <!-- BOTONERA DE ACCIÓN RÁPIDA (SUPERIOR) -->
        <div class="mb-8 flex justify-end">
            <a th:href="@{/familias/nuevo}" class="bg-orange-600 text-white px-10 py-5 rounded-2xl font-black shadow-2xl hover:bg-orange-700 transition-all uppercase">
                <i class="fas fa-plus-circle mr-2"></i> REGISTRAR NUEVA FAMILIA
            </a>
        </div>

        <div class="flex justify-between items-center mb-10">
            <h1 class="text-5xl font-black text-slate-800 tracking-tighter uppercase italic">Entorno Familiar</h1>
        </div>
        <!-- BUSCADOR DE FAMILIAS -->
        <div class="bg-white p-4 rounded-3xl shadow-lg border border-slate-100 mb-8">
            <form th:action="@{/familias}" method="get" class="flex gap-4">
                <input type="text" name="buscar" th:value="${buscar}"
                       placeholder="Buscar por familiar o becado..."
                       class="flex-1 px-6 py-3 bg-slate-50 border-0 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <button type="submit" class="bg-slate-900 text-white px-8 rounded-2xl font-black text-xs uppercase hover:bg-blue-600 transition-all">Buscar</button>
            </form>
        </div>
        <!-- TABLA -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="px-8 py-6">Tutor</th>
                        <th class="px-8 py-6">Vínculo</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="f : ${familias}">
                        <td class="px-8 py-6 font-black text-slate-800" th:text="${f.nombre + ' ' + f.apellidoPaterno}"></td>
                        <td class="px-8 py-6 text-slate-400 font-bold" th:text="${f.parentesco}"></td>
                        <td class="px-8 py-6 text-right">
                            <a th:href="@{'/familias/editar/' + ${f.id}}" class="text-orange-600 font-bold mr-4">Editar</a>
                            <a th:href="@{'/familias/eliminar/' + ${f.id}}" class="text-rose-600 font-bold">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- PAGINACIÓN DINÁMICA -->
        <div class="mt-10 flex justify-center items-center gap-2" th:if="${totalPages > 1}">
            <a th:if="${currentPage > 0}" th:href="@{|/familias?page=${currentPage - 1}&buscar=${buscar ?: ''}|}"
               class="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center shadow-lg hover:bg-blue-600 transition-all"><i class="fas fa-chevron-left"></i></a>

            <div class="flex gap-1">
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{|/familias?page=${i}&buscar=${buscar ?: ''}|}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage} ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'"
                   class="w-10 h-10 rounded-xl flex items-center justify-center font-black text-xs shadow-md transition-all"></a>
            </div>

            <a th:if="${currentPage + 1 < totalPages}" th:href="@{|/familias?page=${currentPage + 1}&buscar=${buscar ?: ''}|}"
               class="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center shadow-lg hover:bg-blue-600 transition-all"><i class="fas fa-chevron-right"></i></a>
        </div>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
