<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Permisos')}"></head>
<body class="bg-slate-50 font-sans">
<div th:replace="~{fragments :: menu}"></div>
<main class="max-w-[1000px] mx-auto px-6 pt-32 pb-20">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black text-slate-800 uppercase italic">Permisos del Sistema</h1>
        <a th:href="@{/config/permisos/nuevo}" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black text-xs uppercase shadow-lg">Nuevo Permiso</a>
    </div>
    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b">
            <tr class="text-[10px] font-black text-slate-400 uppercase">
                <th class="px-8 py-6">ID</th>
                <th class="px-8 py-6">Nombre Clave</th>
                <th class="px-8 py-6">Descripción</th>
                <th class="px-8 py-6 text-right">Acciones</th>
            </tr>
            </thead>
            <tbody class="divide-y">
            <tr th:each="p : ${permisos}">
                <td class="px-8 py-6 text-slate-400" th:text="${p.id}"></td>
                <td class="px-8 py-6 font-black" th:text="${p.name}"></td>
                <td class="px-8 py-6 text-slate-500" th:text="${p.description}"></td>
                <td class="px-8 py-6 text-right">
                    <a th:href="@{'/config/permisos/editar/' + ${p.id}}" class="text-blue-600 font-bold text-xs">EDITAR</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
