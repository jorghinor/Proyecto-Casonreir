<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Gestión - Institución Aliada')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">
    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-4xl mx-auto px-4 py-16 -mt-10">
        <div class="pt-23 pb-12 bg-gradient-to-br from-blue-700 to-indigo-800 text-white text-center shadow-xl">
            <h1 class="text-5xl font-black mb-2 tracking-tighter uppercase italic">Registro de <span class="text-blue-200">Institución</span></h1>
        </div>
        <form th:action="@{/config/instituciones/guardar}" th:object="${institucion}" method="post" class="bg-white rounded-[3rem] shadow-2xl p-12 border">
            <input type="hidden" th:field="*{id}" />
            <div class="grid grid-cols-1 gap-8">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nombre de la Institución</label>
                    <input type="text" th:field="*{nombre}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Dirección / Sede</label>
                    <input type="text" th:field="*{direccion}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl outline-none text-slate-700 font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Teléfono Corporativo</label>
                    <input type="text" th:field="*{telefono}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl outline-none text-slate-700 font-bold">
                </div>
            </div>
            <div class="mt-12 pt-10 border-t flex justify-between">
                <a href="/config/instituciones" class="text-xs font-black text-slate-400 uppercase">Cancelar</a>
                <button type="submit" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-12 py-5 rounded-3xl font-black shadow-2xl hover:scale-105 transition-all">GUARDAR ALIADO</button>
            </div>
        </form>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
