<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Noticias')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1500px] mx-auto px-6">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 pt-32">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Sala de Prensa</h1>
                <p class="text-slate-400 font-bold tracking-widest text-[10px] mt-1 uppercase">Gestión de Comunicados y Novedades</p>
            </div>
            <a th:href="@{/config/noticias/nuevo}" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all text-xs uppercase flex items-center">
                <i class="fas fa-plus-circle mr-3 text-xl"></i> NUEVA NOTICIA
            </a>
        </div>

        <!-- BUSCADOR -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-8 flex gap-4">
            <form th:action="@{/config/noticias}" method="get" class="flex-1 flex gap-4">
                <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar noticia por título..." class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none font-bold">
                <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-xs uppercase hover:bg-blue-600 transition-all">Filtrar</button>
            </form>
        </div>

        <!-- TABLA -->
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b">
                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <th class="px-8 py-6">Título y Avance</th>
                    <th class="px-8 py-6">Publicación</th>
                    <th class="px-8 py-6 text-right">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="n : ${noticias}" class="hover:bg-blue-50/20 transition-all group">
                    <td class="px-8 py-6">
                        <p class="font-black text-slate-800 text-lg leading-none mb-2" th:text="${n.nombre}">-</p>
                        <!-- CORRECCIÓN: th:utext para renderizar HTML y clase line-clamp para no romper la tabla -->
                        <div class="text-[11px] text-slate-500 leading-relaxed line-clamp-2 max-w-2xl" th:utext="${n.detalle}"></div>
                    </td>
                    <td class="px-8 py-6">
                        <span class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase" th:text="${n.fechaInicio}">-</span>
                    </td>
                    <td class="px-8 py-6 text-right space-x-2">
                        <a th:href="@{'/config/noticias/editar/' + ${n.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fas fa-pen text-xs"></i></a>
                        <a th:href="@{'/config/noticias/eliminar/' + ${n.id}}" onclick="return confirm('¿Eliminar esta noticia?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm"><i class="fas fa-trash-alt text-xs"></i></a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- PAGINACIÓN -->
        <div class="mt-10 flex justify-center items-center gap-2" th:if="${totalPages > 1}">
            <a th:if="${currentPage > 0}" th:href="@{/config/noticias(page=${currentPage - 1}, buscar=${buscar})}" class="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center shadow-lg"><i class="fas fa-chevron-left"></i></a>
            <div class="flex gap-1">
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/config/noticias(page=${i}, buscar=${buscar})}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage} ? 'bg-blue-600 text-white shadow-blue-500/50' : 'bg-white text-slate-400'"
                   class="w-10 h-10 rounded-xl flex items-center justify-center font-black text-xs shadow-md transition-all"></a>
            </div>
            <a th:if="${currentPage + 1 < totalPages}" th:href="@{/config/noticias(page=${currentPage + 1}, buscar=${buscar})}" class="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center shadow-lg"><i class="fas fa-chevron-right"></i></a>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
