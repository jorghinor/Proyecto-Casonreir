<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Médicos')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1600px] mx-auto px-6 pt-32 pb-20">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic text-cyan-600">Red de Salud</h1>
                <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Médicos y especialistas aliados</p>
            </div>
            <!-- BOTÓN CORREGIDO -->
            <a href="/config/medicos/nuevo" class="bg-cyan-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:bg-rose-600 transition-all flex items-center z-50 relative">
                <i class="fas fa-user-plus mr-3 text-xl"></i> NUEVO MÉDICO
            </a>
        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black uppercase text-slate-400">
                        <th class="px-8 py-6">Especialista</th>
                        <th class="px-8 py-6">Especialidad</th>
                        <th class="px-8 py-6">Estado</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:if="${medicos == null or medicos.empty}">
                        <td colspan="4" class="px-8 py-20 text-center text-slate-400 italic font-bold">No hay médicos. Pulsa el botón de arriba para crear uno.</td>
                    </tr>
                    <tr th:each="m : ${medicos}">
                        <td class="px-8 py-6">
                            <p class="font-black text-slate-800" th:text="${(m.informacionPersonal != null) ? (m.informacionPersonal.nombre + ' ' + m.informacionPersonal.apellidoPat) : 'Médico ID: ' + m.id}"></p>
                        </td>
                        <td class="px-8 py-6 font-bold text-slate-500" th:text="${m.especialidad != null ? m.especialidad.nombre : 'General'}"></td>
                        <td class="px-8 py-6">
                            <span th:text="${m.estado}" class="bg-emerald-50 text-emerald-600 px-4 py-1.5 rounded-xl text-[10px] font-black"></span>
                        </td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <a th:href="@{'/config/medicos/editar/' + ${m.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-pen text-xs"></i></a>
                            <a th:href="@{'/config/medicos/eliminar/' + ${m.id}}" onclick="return confirm('¿Eliminar médico?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all"><i class="fas fa-trash-alt text-xs"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
