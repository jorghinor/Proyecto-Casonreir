<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Gestión - Permisos')}"></head>
<body class="bg-slate-50 font-sans">
<div th:replace="~{fragments :: menu}"></div>

<main class="max-w-3xl mx-auto px-4 py-16 -mt-10">
    <div class="pt-23 pb-12 bg-gradient-to-br from-indigo-600 to-blue-800 text-white text-center shadow-xl">
        <h1 class="text-5xl font-black mb-2 uppercase italic">Gestión de <span class="text-indigo-200">Permisos</span></h1>
    </div>
    <form th:action="@{/config/permisos/guardar}" th:object="${permiso}" method="post" class="bg-white rounded-[3rem] shadow-2xl p-12 border">
        <input type="hidden" th:field="*{id}" />
        <div class="grid grid-cols-1 gap-8">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Identificador (Name)</label>
                <input type="text" th:field="*{name}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl font-bold" placeholder="EJ: ver_reportes" required>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Descripción</label>
                <textarea th:field="*{description}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl font-medium" rows="3"></textarea>
            </div>
        </div>
        <div class="mt-12 pt-10 border-t flex justify-between">
            <a href="/config/permisos" class="text-xs font-black text-slate-400 uppercase">Volver</a>
            <button type="submit" class="bg-indigo-600 text-white px-12 py-5 rounded-3xl font-black shadow-2xl uppercase">Guardar Permiso</button>
        </div>
    </form>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
