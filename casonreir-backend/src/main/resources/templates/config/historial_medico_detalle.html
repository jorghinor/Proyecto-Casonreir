<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Detalle - Historial Médico')}"></head>
<style>
    /* Estilo exclusivo para el cuadro de contenido */
    .medical-card-bg {
        background-image: linear-gradient(rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.86)),
                          url('/uploads/documentos_medicos/fondodetalle.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
</style>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-6xl mx-auto px-4 py-16 -mt-10" th:with="becado=${historial.becado}, info=${historial.becado?.informacionPersonal}">
        <!-- BANNER DE TÍTULO -->
        <div class="pt-23 pb-12 bg-gradient-to-br from-rose-600 to-pink-700 text-white text-center shadow-xl">
            <h1 class="text-5xl font-black mb-2 tracking-tighter uppercase italic">Detalle <span class="text-rose-200">Médico</span></h1>
            <p class="opacity-80 text-sm tracking-widest uppercase">Información clínica del becado</p>
        </div>

        <!-- CONTENEDOR CON IMAGEN DE FONDO -->
        <div class="medical-card-bg rounded-[3rem] shadow-2xl p-12 border border-slate-100">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

                <!-- Columna Izquierda: Datos del Becado -->
                <div class="lg:col-span-1 space-y-6 text-center">
                    <div class="relative inline-block">
                        <img th:src="${info != null && info.foto != null ? '/uploads/fotos_becados/' + info.foto : 'https://via.placeholder.com/150/F472B6/FFFFFF?text=SIN+FOTO'}"
                             alt="Foto del Becado" class="w-40 h-40 rounded-full object-cover mx-auto shadow-lg border-4 border-rose-200">
                    </div>

                    <div>
                        <h2 class="text-2xl font-black text-slate-800 tracking-tighter uppercase"
                            th:text="${info != null ? info.nombre + ' ' + info.apellidoPat : 'Registro sin Becado'}"></h2>
                        <p class="text-xs font-black text-rose-500 mt-1 uppercase" th:text="${info != null ? 'CI: ' + info.ci : 'Sin Documento'}"></p>
                    </div>

                    <div class="text-left space-y-4 pt-6 border-t border-slate-200/50" th:if="${info != null}">
                        <div class="bg-white/60 p-4 rounded-2xl backdrop-blur-sm border border-white">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Fecha Nacimiento</p>
                            <p class="font-bold text-slate-700 text-sm" th:text="${info.fechaNac}"></p>
                        </div>
                        <div class="bg-white/60 p-4 rounded-2xl backdrop-blur-sm border border-white">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Dirección de Contacto</p>
                            <p class="font-bold text-slate-700 text-xs leading-relaxed" th:text="${info.direccion}"></p>
                        </div>
                    </div>
                </div>

                <!-- Columna Derecha: Detalles del Historial -->
                <div class="lg:col-span-2 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white/80 p-6 rounded-3xl border border-white shadow-inner backdrop-blur-sm">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Fecha de Atención</p>
                            <p class="text-xl font-black text-slate-800" th:text="${historial.fecha}"></p>
                        </div>
                        <div class="bg-rose-50/80 p-6 rounded-3xl border border-rose-100 shadow-inner backdrop-blur-sm">
                            <p class="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-2">Inversión Médica</p>
                            <p class="text-xl font-black text-rose-600" th:text="${historial.costo != null ? 'Bs. ' + historial.costo : 'Bs. 0'}"></p>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Médico / Especialista</p>
                        <p class="text-lg font-bold text-slate-700 bg-white/40 p-2 rounded-lg inline-block" th:text="${historial.medico != null && historial.medico.informacionPersonal != null ? historial.medico.informacionPersonal.nombre + ' ' + historial.medico.informacionPersonal.apellidoPat : 'Atención General'}"></p>
                    </div>

                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Diagnóstico Final</p>
                        <div class="bg-white/90 border border-slate-100 p-8 rounded-[2.5rem] text-slate-600 leading-relaxed shadow-sm min-h-[150px]" th:text="${historial.detalle}"></div>
                    </div>

                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Evidencia / Documento</p>
                        <div th:if="${historial.documento != null && !historial.documento.isEmpty()}" class="flex items-center justify-between bg-slate-900 p-6 rounded-3xl border border-slate-700 text-white shadow-2xl">
                            <div class="flex items-center space-x-4">
                                <i class="fas fa-file-medical-alt text-4xl text-rose-500"></i>
                                <div>
                                    <p class="font-black text-sm uppercase">Expediente Digital</p>
                                    <p class="text-xs opacity-60" th:text="${historial.documento}"></p>
                                </div>
                            </div>
                            <a th:href="@{'/uploads/documentos_medicos/' + ${historial.documento}}" target="_blank" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-700 transition-all">Ver PDF</a>
                        </div>
                        <div th:unless="${historial.documento != null && !historial.documento.isEmpty()}" class="text-slate-400 italic text-sm p-6 bg-white/40 rounded-3xl border border-dashed border-slate-300">No se adjuntó evidencia digital.</div>
                    </div>
                </div>
            </div>

            <div class="mt-12 pt-10 border-t border-slate-200 flex justify-between items-center text-[10px] uppercase font-black tracking-widest">
                <a href="/config/historial-medico" class="text-slate-400 hover:text-rose-600 transition-colors">← Regresar al listado</a>
                <div class="flex space-x-4">
                    <a th:href="@{'/config/historial-medico/editar/' + ${historial.id}}" class="bg-slate-900 text-white px-10 py-4 rounded-2xl hover:bg-rose-600 transition-all shadow-xl">Editar Registro</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
