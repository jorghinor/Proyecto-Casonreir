<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Historial Médico')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

<div th:replace="~{fragments :: menu}"></div>

<main class="max-w-[1600px] mx-auto px-6 pt-32 pb-20">
    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic text-rose-600">Historiales Médicos</h1>
            <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Seguimiento clínico detallado</p>
        </div>
        <a th:href="@{/config/historial-medico/nuevo}" class="bg-rose-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all text-xs uppercase flex items-center">
            <i class="fas fa-notes-medical mr-3 text-xl"></i> NUEVO REGISTRO
        </a>
    </div>

    <!-- BUSCADOR -->
    <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-8 flex gap-4">
        <form th:action="@{/config/historial-medico}" method="get" class="flex-1 flex gap-4">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar por becado, médico o diagnóstico..."
                       class="w-full pl-14 pr-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-rose-100 outline-none font-bold">
            </div>
            <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-xs uppercase hover:bg-rose-600 transition-all">Filtrar</button>
        </form>
    </div>

    <!-- TABLA -->
    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b">
            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <th class="px-8 py-6">Becado</th>
                <th class="px-8 py-6">Médico / Especialista</th>
                <th class="px-8 py-6">Diagnóstico / Detalle</th>
                <th class="px-8 py-6">Costo (Bs)</th>
                <th class="px-8 py-6">Documento</th>
                <th class="px-8 py-6 text-right">Acciones</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
            <tr th:each="h : ${historiales}" class="hover:bg-rose-50/10 transition-all group">
                <td class="px-8 py-6">
                    <p class="font-black text-slate-800 text-sm"
                       th:text="${h.becado != null ? h.becado.informacionPersonal.nombre + ' ' + h.becado.informacionPersonal.apellidoPat : '---'}"></p>
                    <p class="text-[9px] text-slate-400 font-bold uppercase" th:text="${h.fecha}"></p>
                </td>
                <td class="px-8 py-6 font-bold text-slate-500 text-xs"
                    th:text="${h.medico != null ? h.medico.informacionPersonal.nombre + ' ' + h.medico.informacionPersonal.apellidoPat : 'Pendiente'}"></td>
                <td class="px-8 py-6 text-xs text-slate-600 italic">
                    <span class="line-clamp-2" th:text="${h.detalle}">-</span>
                </td>
                <td class="px-8 py-6">
                    <span class="text-rose-600 font-black" th:text="${h.costo != null ? 'Bs. ' + h.costo : 'Bs. 0'}"></span>
                </td>
                <td class="px-8 py-6">
                    <a th:if="${h.documento != null && !h.documento.isEmpty()}"
                       th:href="@{'/uploads/documentos_medicos/' + ${h.documento}}" target="_blank"
                       class="inline-flex items-center space-x-2 text-blue-600 hover:text-blue-800 font-black text-[10px] uppercase">
                        <i class="fas fa-file-alt text-lg"></i>
                        <span>Ver Doc.</span>
                    </a>
                    <span th:unless="${h.documento != null && !h.documento.isEmpty()}" class="text-slate-300 italic text-[10px]">Sin documento</span>
                </td>
                <td class="px-8 py-6 text-right space-x-2">
                    <a th:href="@{'/config/historial-medico/detalle/' + ${h.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fas fa-eye text-xs"></i></a>
                    <a th:href="@{'/config/historial-medico/editar/' + ${h.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm"><i class="fas fa-pen text-xs"></i></a>
                    <a th:href="@{'/config/historial-medico/eliminar/' + ${h.id}}" onclick="return confirm('¿Eliminar?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm"><i class="fas fa-trash-alt text-xs"></i></a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
