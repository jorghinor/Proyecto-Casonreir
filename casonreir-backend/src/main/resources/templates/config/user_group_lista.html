<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Asignación de Roles')}"></head>
<body class="bg-slate-50 font-sans">
<div th:replace="~{fragments :: menu}"></div>
<main class="max-w-[1200px] mx-auto px-6 pt-32 pb-20">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black text-slate-800 uppercase italic">Usuarios y <span class="text-orange-600">Roles</span></h1>
        <a th:href="@{/config/usuarios-grupos/nuevo}" class="bg-orange-600 text-white px-6 py-3 rounded-xl font-black text-xs uppercase shadow-lg">+ Asignar Rol</a>
    </div>

    <!-- BUSCADOR -->
    <div class="bg-white p-4 rounded-3xl shadow-lg border border-slate-100 mb-8">
        <form th:action="@{/config/usuarios-grupos}" method="get" class="flex gap-4">
            <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar por usuario o grupo..."
                   class="flex-1 px-6 py-3 bg-slate-50 border-0 rounded-2xl font-bold outline-none">
            <button type="submit" class="bg-slate-900 text-white px-8 rounded-2xl font-black text-xs uppercase hover:bg-orange-600 transition-all">Buscar</button>
        </form>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b">
            <tr class="text-[10px] font-black text-slate-400 uppercase">
                <th class="px-8 py-6">Usuario</th>
                <th class="px-8 py-6">Grupo / Rol</th>
                <th class="px-8 py-6 text-right">Acciones</th>
            </tr>
            </thead>
            <tbody class="divide-y">
            <tr th:each="item : ${lista}">
                <td class="px-8 py-6 font-black" th:text="${item.user.username}"></td>
                <td class="px-8 py-6">
                    <span class="bg-orange-50 text-orange-600 px-3 py-1 rounded-lg font-bold text-xs" th:text="${item.group.name}"></span>
                </td>
                <td class="px-8 py-6 text-right">
                    <a th:href="@{'/config/usuarios-grupos/eliminar/' + ${item.user.id} + '/' + ${item.group.id}}"
                       class="text-rose-600 font-bold text-xs uppercase" onclick="return confirm('¿Quitar este rol?')">Quitar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
