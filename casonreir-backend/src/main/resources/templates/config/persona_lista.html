<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Administración - Personas')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-[1600px] mx-auto px-6 pt-32 pb-20">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic text-blue-600">Directorio de Personas</h1>
                <p class="text-slate-400 font-bold tracking-widest text-xs mt-1 uppercase">Mantenimiento de información maestra</p>
            </div>
            <a th:href="@{/config/personas/nuevo}" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all text-xs uppercase flex items-center">
                <i class="fas fa-user-plus mr-3 text-xl"></i> REGISTRAR PERSONA
            </a>
        </div>

        <!-- BUSCADOR -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-8 flex gap-4">
            <form th:action="@{/config/personas}" method="get" class="flex-1 flex gap-4">
                <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar por nombre, apellido o CI..." class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl outline-none font-bold">
                <button type="submit" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-xs uppercase hover:bg-blue-600 transition-all">Filtrar</button>
            </form>
        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="px-8 py-6">Foto</th>
                        <th class="px-8 py-6">Nombre Completo</th>
                        <th class="px-8 py-6">CI / Identidad</th>
                        <th class="px-8 py-6 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="p : ${personas}" class="hover:bg-blue-50/10 transition-all group">
                        <td class="px-8 py-6">
                            <img th:src="${p.foto != null ? '/uploads/fotos_becados/' + p.foto : 'https://via.placeholder.com/50/E2E8F0/64748B?text=?'}"
                                 class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-md">
                        </td>
                        <td class="px-8 py-6">
                            <p class="font-black text-slate-800 text-lg" th:text="${p.nombre + ' ' + p.apellidoPat}"></p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase" th:text="${p.correoE}"></p>
                        </td>
                        <td class="px-8 py-6">
                            <p class="font-bold text-slate-600" th:text="${p.ci}"></p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase" th:text="${p.lugarCi}"></p>
                        </td>
                        <td class="px-8 py-6 text-right space-x-2">
                            <!-- ACCIONES -->
                            <a th:href="@{'/config/personas/pdf/' + ${p.id}}" class="inline-flex w-10 h-10 bg-rose-50 text-rose-600 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm" title="Descargar Ficha PDF">
                                <i class="fas fa-file-pdf text-xs"></i>
                            </a>
                            <a th:href="@{'/config/personas/editar/' + ${p.id}}" class="inline-flex w-10 h-10 bg-slate-100 text-slate-600 rounded-xl items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-pen text-xs"></i>
                            </a>
                            <a th:href="@{'/config/personas/eliminar/' + ${p.id}}" onclick="return confirm('¿Eliminar?')" class="inline-flex w-10 h-10 bg-slate-100 text-slate-400 rounded-xl items-center justify-center hover:bg-rose-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- PAGINACIÓN RESTAURADA -->
            <div class="bg-slate-50 px-8 py-6 flex justify-between items-center border-t">
                <p class="text-[10px] font-black text-slate-400 uppercase">Página <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span></p>
                <div class="flex space-x-2">
                    <a th:if="${currentPage > 0}" th:href="@{/config/personas(page=${currentPage - 1}, buscar=${buscar})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black transition-all">Anterior</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/config/personas(page=${currentPage + 1}, buscar=${buscar})}" class="px-5 py-2 bg-white border rounded-xl text-[10px] font-black transition-all">Siguiente</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
