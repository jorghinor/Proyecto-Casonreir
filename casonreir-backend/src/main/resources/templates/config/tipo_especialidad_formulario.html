<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Especialidad Médica')}"></head>
<body class="bg-slate-50 font-sans">
<div th:replace="~{fragments :: menu}"></div>

<main class="max-w-3xl mx-auto px-4 py-16 -mt-10">
    <div class="pt-23 pb-12 bg-gradient-to-br from-emerald-600 to-teal-800 text-white text-center shadow-xl">
        <h1 class="text-5xl font-black mb-2 uppercase italic">Especialidad <span class="text-emerald-200">Médica</span></h1>
    </div>
    <form th:action="@{/config/tipos-especialidad/guardar}" th:object="${especialidad}" method="post" class="bg-white rounded-[3rem] shadow-2xl p-12 border">
        <input type="hidden" th:field="*{id}" />
        <div class="grid grid-cols-1 gap-8">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre de la Especialidad</label>
                <input type="text" th:field="*{nombre}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl font-bold" placeholder="EJ: Pediatría" required>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado</label>
                <select th:field="*{estado}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl font-bold">
                    <option value="ACTIVO">ACTIVO</option>
                    <option value="INACTIVO">INACTIVO</option>
                </select>
            </div>
        </div>
        <div class="mt-12 pt-10 border-t flex justify-between">
            <a href="/config/tipos-especialidad" class="text-xs font-black text-slate-400 uppercase">Volver</a>
            <button type="submit" class="bg-emerald-600 text-white px-12 py-5 rounded-3xl font-black shadow-2xl uppercase">Guardar</button>
        </div>
    </form>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
