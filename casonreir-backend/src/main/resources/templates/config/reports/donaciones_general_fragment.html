<div th:fragment="report">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-black text-slate-800 uppercase italic">Registro General de Donaciones</h2>
        <a th:href="@{/config/reportes/donaciones-general-pdf}"
           class="bg-green-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase shadow-lg flex items-center">
            <i class="fas fa-file-pdf mr-2"></i> Descargar PDF
        </a>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                <th class="py-4 px-2">Fecha</th>
                <th class="py-4 px-2">Referencia</th>
                <th class="py-4 px-2">Donante</th>
                <th class="py-4 px-2 text-right">Monto</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="d : ${donaciones}" class="text-sm hover:bg-slate-50">
                <td class="py-4 px-2 text-slate-500" th:text="${d.getFecha()}"></td>
                <td class="py-4 px-2 font-bold text-slate-700" th:text="${d.getNombre()}"></td>
                <td class="py-4 px-2 text-slate-600">
                    <span th:if="${d.padrino != null}" th:text="${d.padrino.informacionPersonal.nombre + ' ' + d.padrino.informacionPersonal.apellidoPat}"></span>
                    <span th:if="${d.institucion != null}" th:text="${d.institucion.nombre}"></span>
                    <span th:if="${d.padrino == null && d.institucion == null}" class="italic">Externo</span>
                </td>
                <td class="py-4 px-2 text-right font-black text-green-600" th:text="${'Bs. ' + d.cantidad}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
