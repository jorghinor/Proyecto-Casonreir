<div th:fragment="report">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-black text-slate-800 uppercase italic">Estado de la Fundación</h2>
        <a th:href="@{/config/reportes/fundacion-general-pdf}"
           class="bg-teal-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase shadow-lg flex items-center">
            <i class="fas fa-file-pdf mr-2"></i> Descargar Informe
        </a>
    </div>

    <!-- Dashboard de Indicadores -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
            <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Total Becados</p>
            <p class="text-3xl font-black text-blue-700" th:text="${totalBecados}"></p>
        </div>
        <div class="bg-amber-50 p-6 rounded-3xl border border-amber-100">
            <p class="text-[10px] font-black text-amber-400 uppercase tracking-widest">Total Padrinos</p>
            <p class="text-3xl font-black text-amber-700" th:text="${totalPadrinos}"></p>
        </div>
        <div class="bg-green-50 p-6 rounded-3xl border border-green-100">
            <p class="text-[10px] font-black text-green-400 uppercase tracking-widest">Recaudación Total</p>
            <p class="text-3xl font-black text-green-700" th:text="${'Bs. ' + #numbers.formatDecimal(recaudadoTotal, 1, 2)}"></p>
        </div>
        <div class="bg-purple-50 p-6 rounded-3xl border border-purple-100">
            <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest">Sedes C.E.A.</p>
            <p class="text-3xl font-black text-purple-700" th:text="${totalSedes}"></p>
        </div>
        <div class="bg-cyan-50 p-6 rounded-3xl border border-cyan-100">
            <p class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">Médicos</p>
            <p class="text-3xl font-black text-cyan-700" th:text="${totalMedicos}"></p>
        </div>
        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Donaciones</p>
            <p class="text-3xl font-black text-slate-700" th:text="${totalDonaciones}"></p>
        </div>
    </div>
</div>
