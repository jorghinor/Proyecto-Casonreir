<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Gestión - Formulario Becado')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-4xl mx-auto px-4 py-16 -mt-10">
        <div class="pt-23 pb-12 bg-gradient-to-br from-blue-600 to-indigo-700 text-white text-center shadow-xl">
            <!--<div class="max-w-4xl mx-auto px-4" data-aos="zoom-in">-->
            <h1 class="text-5xl font-black mb-2 tracking-tighter uppercase italic">Ficha del <span class="text-blue-200">Becado</span></h1>
            <p class="text-xl opacity-80 font-light">Registro y actualización de datos del beneficiario.</p>
            <!--</div>-->
        </div>
        <!-- Verificamos que el objeto becado y su info existan para evitar errores 500 -->
        <form th:action="@{/becados/guardar}" th:object="${becado}" method="post"
              class="bg-white rounded-[3rem] shadow-[0_50px_100px_rgba(0,0,0,0.1)] p-12 border border-slate-100"
              th:if="${becado != null}">

            <input type="hidden" th:field="*{id}" />
            <!-- Campo oculto seguro para la info personal -->
            <input type="hidden" th:if="*{informacionPersonal != null}" th:field="*{informacionPersonal.id}" />

            <div class="flex items-center space-x-4 mb-10 border-b border-slate-50 pb-6">
                <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 shadow-inner">
                    <i class="fas fa-id-card text-2xl"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Información Personal</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8" th:if="*{informacionPersonal != null}">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nombres</label>
                    <input type="text" th:field="*{informacionPersonal.nombre}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Ap. Paterno</label>
                    <input type="text" th:field="*{informacionPersonal.apellidoPat}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Ap. Materno</label>
                    <input type="text" th:field="*{informacionPersonal.apellidoMat}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Documento (CI)</label>
                    <input type="text" th:field="*{informacionPersonal.ci}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha Nacimiento</label>
                    <input type="date" th:field="*{informacionPersonal.fechaNac}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Estado en el Programa</label>
                    <select th:field="*{estadoBecado}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-bold cursor-pointer">
                        <option value="ACTIVO">ACTIVO</option>
                        <option value="INACTIVO">INACTIVO</option>
                    </select>
                </div>
                <!--<div class="md:col-span-2 space-y-2">-->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Dirección de Domicilio</label>
                    <textarea th:field="*{informacionPersonal.direccion}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none text-slate-700 font-medium" rows="2"></textarea>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nro de Hermanos</label>
                    <input type="number" th:field="*{numHermanos}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha de Ingreso</label>
                    <input type="date" th:field="*{ingresoBecado}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl font-bold" required>
                </div>
                <!-- NUEVOS CAMPOS PREMIUM -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-blue-600 uppercase italic tracking-widest ml-1">Hobby o Pasatiempo (Aparece en Web Pública)</label>
                    <input type="text" th:field="*{hobby}" class="w-full px-6 py-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-bold" placeholder="Ej: Jugar fútbol, Pintura...">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Aspiración o Sueño</label>
                    <input type="text" th:field="*{aspiracion}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl font-bold" placeholder="Ej: Ser Médico">
                </div>
            </div>

            <div class="mt-12 pt-10 border-t border-slate-100 flex justify-between items-center">
                <a href="/becados" class="text-xs font-black text-slate-400 hover:text-slate-600 transition tracking-widest uppercase">Cancelar</a>
                <button type="submit" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-12 py-5 rounded-3xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all">
                    GUARDAR REGISTRO <i class="fas fa-save ml-2"></i>
                </button>
            </div>
        </form>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
