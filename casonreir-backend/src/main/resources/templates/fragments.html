<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Fundación Casonreir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card-grad-1 { background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); }
        .card-grad-2 { background: linear-gradient(135deg, #e11d48 0%, #f43f5e 100%); }
        .card-grad-3 { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .card-grad-4 { background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); }
        .hover-elevate { transition: all 0.5s ease; }
        .hover-elevate:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.35); }
        .footer-premium { background: linear-gradient(to right, #0f172a, #1e3a8a, #0f172a); }
        .nav-item { font-weight: 800; font-size: 0.65rem; letter-spacing: 0.15em; color: #64748b; transition: all 0.3s; }
        .nav-item:hover { color: #2563eb; }
        /* FRAGMENTO 2: SCROLLBAR DEL BUSCADOR */
        #quickSearchResults::-webkit-scrollbar { width: 5px; }
        #quickSearchResults::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>

<body>

    <nav th:fragment="menu" class="glass-nav fixed w-full z-[100] h-20 flex items-center shadow-sm">
        <div class="max-w-[1600px] mx-auto w-full px-6 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-3 group">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg transform group-hover:rotate-12 transition-all">
                    <i class="fas fa-rocket text-white"></i>
                </div>
                <span class="text-xl font-black text-slate-800 tracking-tighter uppercase italic">CASONREIR</span>
            </a>
            <!-- FRAGMENTO 1: INPUT DE BÚSQUEDA -->
            <div class="relative hidden xl:block ml-8">
                <div class="flex items-center bg-slate-100 rounded-2xl px-4 py-2 border border-slate-200 focus-within:ring-2 focus-within:ring-blue-400 transition-all">
                    <i class="fas fa-search text-slate-400 mr-3 text-xs"></i>
                    <input type="text" id="quickSearchInput" placeholder="Búsqueda rápida de contacto..."
                           class="bg-transparent border-none outline-none text-[11px] font-bold text-slate-700 w-64 placeholder:text-slate-400 uppercase">
                </div>
                <!-- Dropdown de Resultados -->
                <div id="quickSearchResults" class="hidden absolute top-full left-0 mt-4 w-96 bg-white rounded-[2.5rem] shadow-[0_30px_100px_rgba(0,0,0,0.2)] border border-slate-100 p-6 z-[200] max-h-[500px] overflow-y-auto">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Resultados de Contacto</h4>
                    <div id="searchCardsContainer" class="space-y-4"></div>
                </div>
            </div>
            <div class="hidden lg:flex items-center space-x-8 uppercase">
                <a href="/" class="nav-item">Dashboard</a>
                <a href="/becados" class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'ENCARGADO', 'AUXILIAR', 'MEDICO')">Becados</a>
                <a href="/padrinos" class="nav-item">Padrinos</a>
                <a href="/donaciones" class="nav-item">Donaciones</a>
                <a href="/actividades" class="nav-item">Actividades</a>
                <a href="/familias" class="nav-item">Familias</a>
                <div class="w-px h-6 bg-slate-200"></div>
                <a sec:authorize="isAuthenticated()" href="/config/hub" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 hover:bg-blue-600 hover:text-white transition-all shadow-inner"><i class="fas fa-cog"></i></a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black hover:bg-rose-600 transition-all shadow-lg uppercase">Salir</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- FRAGMENTO: BARRA DE MÉTRICAS (Igual al Dashboard) -->
    <div th:fragment="stats-bar" class="max-w-[1500px] mx-auto px-6 -mt-24 relative z-20 mb-16">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
            <div class="card-grad-1 p-8 rounded-[3rem] shadow-2xl hover-elevate group text-white border border-white/10" data-aos="fade-up">
                <div class="flex items-center justify-between">
                    <div><h3 class="text-white/70 font-black uppercase text-[10px] tracking-widest mb-1">Becados</h3><p class="text-3xl font-black" th:text="${totalBecados ?: 0}"></p></div>
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-white shadow-inner group-hover:rotate-12 transition-transform"><i class="fas fa-user-graduate text-2xl"></i></div>
                </div>
            </div>
            <div class="card-grad-2 p-8 rounded-[3rem] shadow-2xl hover-elevate group text-white border border-white/10" data-aos="fade-up" data-aos-delay="100">
                <div class="flex items-center justify-between">
                    <div><h3 class="text-white/70 font-black uppercase text-[10px] tracking-widest mb-1">Padrinos</h3><p class="text-3xl font-black" th:text="${totalPadrinos ?: 0}"></p></div>
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-white shadow-inner group-hover:rotate-12 transition-transform"><i class="fas fa-heart text-2xl"></i></div>
                </div>
            </div>
            <div class="card-grad-3 p-8 rounded-[3rem] shadow-2xl hover-elevate group text-white border border-white/10" data-aos="fade-up" data-aos-delay="200">
                <div class="flex items-center justify-between">
                    <div><h3 class="text-white/70 font-black uppercase text-[10px] tracking-widest mb-1">Recaudado</h3><p class="text-2xl font-black" th:text="${'Bs. ' + (totalRecaudado ?: '0.00')}"></p></div>
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-white shadow-inner group-hover:rotate-12 transition-transform"><i class="fas fa-hand-holding-usd text-2xl"></i></div>
                </div>
            </div>
            <div class="card-grad-4 p-8 rounded-[3rem] shadow-2xl hover-elevate group text-white border border-white/10" data-aos="fade-up" data-aos-delay="300">
                <div class="flex items-center justify-between">
                    <div><h3 class="text-white/70 font-black uppercase text-[10px] tracking-widest mb-1">Eventos</h3><p class="text-3xl font-black" th:text="${totalActividades ?: 0}"></p></div>
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-white shadow-inner group-hover:rotate-12 transition-transform"><i class="fas fa-calendar-check text-2xl"></i></div>
                </div>
            </div>
        </div>
    </div>

    <footer th:fragment="footer" class="footer-premium py-20 text-center text-white border-t border-white/5 mt-20">
        <div class="mb-6 opacity-30 text-4xl"><i class="fas fa-heart"></i></div>
        <p class="text-[11px] font-black uppercase tracking-[0.8em] mb-4 opacity-50">Master Administration Panel</p>
        <p class="text-xs font-bold uppercase tracking-widest">&copy; 2026 FUNDACIÓN CASONREIR &bull; BOLIVIA</p>
    </footer>

    <script th:fragment="magic-script">
        document.addEventListener('DOMContentLoaded', function() {
            const path = window.location.pathname;
            const h1 = document.querySelector('main h1');

            // 1. Crear el Banner de Cabecera (Ancho Dashboard)
            if (path !== '/' && !path.includes('login')) {
                const heroSection = document.createElement('section');
                heroSection.className = 'relative h-[60vh] flex items-center justify-center overflow-hidden bg-slate-950 mb-0';
                heroSection.innerHTML = `
                    <div class="absolute inset-0 z-0 opacity-40">
                        <img src="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=2070&auto=format&fit=crop" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-b from-slate-950/20 via-transparent to-slate-50"></div>
                `;
                const main = document.querySelector('main');
                if (main) main.parentNode.insertBefore(heroSection, main);
            }

            const table = document.querySelector('table');
            if (table) {
                const wrapper = document.createElement('div');
                wrapper.className = 'bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100 mb-20 hover-elevate';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
                table.className = 'w-full text-left';
                const thead = table.querySelector('thead');
                if (thead) thead.className = 'bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest';
            }

            if (typeof AOS !== 'undefined') {
                AOS.init({ once: true, duration: 1000, easing: 'ease-out-quint' });
                document.querySelectorAll('.hover-elevate, main > div').forEach(el => el.setAttribute('data-aos', 'fade-up'));
            }
            // Lógica del Buscador Rápido de Contacto
            const searchInput = document.getElementById('quickSearchInput');
            const resultsDiv = document.getElementById('quickSearchResults');
            const cardsContainer = document.getElementById('searchCardsContainer');

            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    const term = this.value;
                    if (term.length < 2) {
                        resultsDiv.classList.add('hidden');
                        return;
                    }

                    fetch(`/api/becados/buscar-contacto?term=${term}`)
                        .then(res => res.json())
                        .then(data => {
                            cardsContainer.innerHTML = '';
                            if (data.length === 0) {
                                cardsContainer.innerHTML = '<p class="text-[10px] text-slate-400 text-center py-4 uppercase font-black italic">Sin coincidencias</p>';
                            } else {
                                data.forEach(b => {
                                    const card = document.createElement('div');
                                    card.className = 'bg-slate-50 p-5 rounded-3xl border border-slate-100 hover:bg-blue-50 hover:border-blue-200 transition-all cursor-pointer group';
                                    card.innerHTML = `
                                    <p class="font-black text-slate-800 text-sm uppercase group-hover:text-blue-600 transition-colors">${b.nombre}</p>
                                    <div class="mt-3 space-y-2">
                                        <div class="flex items-center text-[10px] text-slate-500 font-bold">
                                            <i class="fas fa-phone-alt w-4 text-blue-500"></i> ${b.telefono}
                                        </div>
                                        <div class="flex items-center text-[10px] text-slate-500 font-bold">
                                            <i class="fas fa-envelope w-4 text-blue-500"></i> ${b.email}
                                        </div>
                                        <div class="mt-2 pt-2 border-t border-slate-200/50">
                                            <p class="text-[9px] text-slate-400 font-black uppercase">Tutor Responsable</p>
                                            <p class="text-[10px] text-slate-700 font-black uppercase">${b.tutor}</p>
                                        </div>
                                    </div>
                                `;
                                    card.onclick = () => window.location.href = `/becados/detalle/${b.id}`;
                                    cardsContainer.appendChild(card);
                                });
                            }
                            resultsDiv.classList.remove('hidden');
                        });
                });

                // Cerrar al hacer clic fuera
                document.addEventListener('click', (e) => {
                    if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
                        resultsDiv.classList.add('hidden');
                    }
                });
            }
        });
    </script>

</body>
</html>
