<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Gestión - Formulario Padrino')}"></head>
<body class="bg-slate-50 font-sans leading-normal tracking-normal overflow-x-hidden">
    <div th:replace="~{fragments :: menu}"></div>

    <main class="max-w-4xl mx-auto px-4 py-16 -mt-10">
        <div class="pt-23 pb-12 bg-gradient-to-br from-purple-600 to-indigo-800 text-white text-center shadow-xl">
            <h1 class="text-5xl font-black mb-2 tracking-tighter uppercase italic">Ficha del <span class="text-purple-200">Padrino</span></h1>
        </div>
        <form th:action="@{/padrinos/guardar}" th:object="${padrino}" method="post" class="bg-white rounded-[3rem] shadow-2xl p-12 border">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:if="*{informacionPersonal != null}" th:field="*{informacionPersonal.id}" />

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8" th:if="*{informacionPersonal != null}">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nombres</label>
                    <input type="text" th:field="*{informacionPersonal.nombre}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-purple-100 outline-none font-bold" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Ap. Paterno</label>
                    <input type="text" th:field="*{informacionPersonal.apellidoPat}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-purple-100 outline-none font-bold" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Profesión</label>
                    <input type="text" th:field="*{profesion}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-purple-100 outline-none font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Estado</label>
                    <select th:field="*{estado}" class="w-full px-6 py-4 bg-slate-50 border-0 rounded-2xl focus:ring-4 focus:ring-purple-100 outline-none font-bold">
                        <option value="ACTIVO">ACTIVO</option>
                        <option value="INACTIVO">INACTIVO</option>
                    </select>
                </div>
            </div>

            <div class="mt-12 pt-10 border-t flex justify-between">
                <a href="/padrinos" class="text-xs font-black text-slate-400 uppercase">Cancelar</a>
                <button type="submit" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-12 py-5 rounded-3xl font-black shadow-2xl hover:scale-105 transition-all">GUARDAR PADRINO</button>
            </div>
        </form>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: magic-script}"></script>
</body>
</html>
