spring.application.name=casonreir-backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/casonreir}
spring.datasource.username=user_admin
spring.datasource.password=password_secret

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Aumentar el tamaño máximo de subida de archivos (ej. 100MB)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# =========================
# Email notifications
# =========================
# SMTP settings (ejemplo):
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=jorghinorock@gmail.com
spring.mail.password=futjor8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Activa/desactiva envío de notificaciones por correo
app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:false}
# Remitente usado en notificaciones
app.notifications.email.from=${APP_NOTIFICATIONS_EMAIL_FROM:no-reply@casonreir.org}
# Copia opcional para auditoría interna
app.notifications.email.audit-to=${APP_NOTIFICATIONS_EMAIL_AUDIT_TO:}
